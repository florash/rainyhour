<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rainy Hour</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet">
<style>
:root {
  --text: rgba(255,255,255,0.95);
  --dim: rgba(200,215,240,0.5);
  --accent: rgba(180,210,255,0.9);
  --border: rgba(200,220,255,0.15);
  --panel-bg: rgba(6,12,24,0.30);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:#060c18; font-family:'Jost',sans-serif; cursor:none; }
@media (pointer:coarse) { html, body { cursor:auto; } }

/* ── Backgrounds ── */
.bg { position:fixed; inset:0; z-index:0; background-size:cover; background-position:center; opacity:0; transition:opacity 1.8s ease, transform 8s ease; transform:scale(1.04); }
.bg.active { opacity:1; transform:scale(1); }
.bg-overlay { position:fixed; inset:0; z-index:1; pointer-events:none; background:linear-gradient(180deg,rgba(4,8,18,0.6) 0%,rgba(4,8,18,0.4) 45%,rgba(4,8,18,0.65) 75%,rgba(4,8,18,0.92) 100%); }

/* ── Canvas ── */
#rainCanvas  { position:fixed; inset:0; z-index:2; pointer-events:none; }
#rippleCanvas{ position:fixed; bottom:0; left:0; width:100%; height:120px; z-index:3; pointer-events:none; opacity:0.55; }

/* ── Lightning ── */
.flash-overlay { position:fixed; inset:0; z-index:4; pointer-events:none; background:rgba(220,235,255,0); transition:background 0.06s; }
.flash-overlay.on { background:rgba(220,235,255,0.22); }

/* ── Bird dots ── */
.bird-dot { position:fixed; z-index:5; pointer-events:none; width:5px; height:2px; border-radius:50%; background:rgba(220,235,255,0.45); opacity:0; animation:birdFly 9s linear forwards; }
@keyframes birdFly { 0%{opacity:0;transform:translate(0,0)} 10%{opacity:0.6} 90%{opacity:0.2} 100%{opacity:0;transform:translate(var(--dx),var(--dy))} }

/* ── Hero ── */
.hero {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  pointer-events:none; user-select:none;
  /* shift up slightly so controls don't overlap */
  padding-bottom: 80px;
}
.title {
  font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300;
  font-size:clamp(3.8rem,14vw,8rem);
  color:#fff; letter-spacing:0.03em; line-height:1;
  text-shadow: 0 2px 40px rgba(0,0,0,0.9), 0 0 80px rgba(0,0,0,0.7);
  animation:breath 7s ease-in-out infinite;
}
.slogan {
  margin-top:1.1em;
  font-family:'Jost',sans-serif; font-weight:200;
  font-size:clamp(0.58rem,2.8vw,0.82rem);
  letter-spacing:0.42em; color:var(--dim); text-transform:lowercase;
  text-shadow:0 1px 12px rgba(0,0,0,0.8);
}
@keyframes breath { 0%,100%{opacity:0.88} 50%{opacity:1} }

/* ── Top bar: scene picker + clock ── */
.topbar {
  position:fixed; top:0; left:0; right:0; z-index:20;
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 20px 12px;
  background:linear-gradient(180deg,rgba(4,8,18,0.55) 0%,transparent 100%);
  pointer-events:none;
}
.scene-picker { display:flex; gap:7px; align-items:center; pointer-events:all; }
.thumb {
  width:32px; height:24px; border-radius:3px; cursor:pointer;
  background-size:cover; background-position:center;
  opacity:0.4; transition:opacity 0.3s, box-shadow 0.3s;
  border:1px solid rgba(255,255,255,0.08);
}
.thumb:hover, .thumb:active { opacity:0.8; }
.thumb.active { opacity:1; box-shadow:0 0 0 1.5px rgba(180,210,255,0.7); }
.scene-label { font-size:0.46rem; letter-spacing:0.45em; color:var(--dim); text-transform:uppercase; margin-left:3px; }
.clock {
  font-family:'Jost',sans-serif; font-weight:200;
  font-size:0.68rem; letter-spacing:0.28em; color:var(--dim);
  text-align:right; line-height:1.7; pointer-events:none;
}

/* ── Quote (desktop only) ── */
.quote {
  position:fixed; left:28px; z-index:10;
  bottom:120px;
  font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:300;
  font-size:clamp(0.78rem,1.2vw,0.95rem);
  color:rgba(200,220,250,0.28); line-height:2.1;
  pointer-events:none; max-width:180px; transition:opacity 3s;
}
@media (max-width:600px) { .quote { display:none; } }

/* ── Bottom drawer ── */
.drawer-wrap {
  position:fixed; bottom:0; left:0; right:0; z-index:30;
  display:flex; flex-direction:column; align-items:center;
}

/* Pull tab */
.drawer-tab {
  display:flex; align-items:center; gap:8px;
  padding:10px 24px 8px;
  cursor:pointer; user-select:none;
  background:linear-gradient(0deg,rgba(6,12,24,0.5) 0%,transparent 100%);
}
.tab-line { width:32px; height:1px; background:rgba(180,210,255,0.25); border-radius:1px; transition:background 0.3s; }
.tab-dot { width:4px; height:4px; border-radius:50%; background:var(--dim); animation:dotPulse 2s ease-in-out infinite; }
@keyframes dotPulse { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:0.8;transform:scale(1.3)} }
.tab-label { font-size:0.46rem; letter-spacing:0.5em; color:var(--dim); text-transform:uppercase; font-family:'Jost',sans-serif; }

/* Drawer panel */
.drawer {
  width:100%; max-width:520px;
  background:var(--panel-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  border-radius:16px 16px 0 0;
  padding:0 20px 24px;
  overflow:hidden;
  max-height:0;
  transition:max-height 0.45s cubic-bezier(0.4,0,0.2,1), padding 0.45s;
}
.drawer.open {
  max-height:420px;
  padding:16px 20px 32px;
}

/* Drawer content */
.d-section { margin-bottom:14px; }
.d-label { font-size:0.46rem; letter-spacing:0.55em; color:rgba(180,210,255,0.25); text-transform:uppercase; font-family:'Jost',sans-serif; margin-bottom:10px; }

/* Sliders row */
.sliders-row { display:flex; gap:0; align-items:stretch; width:100%; }
.sl-group { display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; }
.sl-label { font-size:0.5rem; letter-spacing:0.35em; color:var(--dim); text-transform:uppercase; font-family:'Jost',sans-serif; }
input[type=range] {
  -webkit-appearance:none; appearance:none;
  width:100%; max-width:90px; height:2px;
  background:rgba(180,210,255,0.18); outline:none; border-radius:2px; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:14px; height:14px;
  border-radius:50%; background:var(--accent);
  box-shadow:0 0 8px rgba(150,190,255,0.5);
}

/* Buttons row */
.btns-row { display:flex; gap:8px; width:100%; }
.btn {
  flex:1; font-family:'Jost',sans-serif; font-weight:300;
  font-size:0.58rem; letter-spacing:0.35em; color:var(--dim);
  background:transparent; border:1px solid var(--border);
  padding:9px 8px; cursor:pointer; border-radius:4px;
  transition:all 0.3s; text-transform:uppercase; text-align:center;
}
.btn.active { color:var(--accent); border-color:rgba(180,210,255,0.45); background:rgba(100,160,255,0.07); }

/* Sound tracks */
.tracks-row { display:flex; gap:7px; width:100%; }
.track {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:6px;
  padding:10px 6px 8px;
  border:1px solid var(--border); border-radius:6px;
  cursor:pointer; transition:all 0.3s; background:transparent;
  font-family:'Jost',sans-serif;
}
.track:active { background:rgba(100,160,255,0.05); }
.track.active { border-color:rgba(180,210,255,0.4); background:rgba(100,160,255,0.08); }
.track-icon { font-size:1.1rem; line-height:1; }
.track-name { font-size:0.5rem; letter-spacing:0.2em; color:var(--dim); text-transform:uppercase; text-align:center; line-height:1.4; }
.track.active .track-name { color:var(--accent); }
.track-sub { font-size:0.42rem; letter-spacing:0.1em; color:rgba(180,210,255,0.25); text-align:center; }

/* Waveform */
.wave { display:flex; gap:2px; align-items:flex-end; height:10px; opacity:0; transition:opacity 0.4s; }
.track.active .wave { opacity:1; }
.bar { width:2.5px; background:var(--accent); border-radius:1px; animation:ba 0.9s ease-in-out infinite alternate; opacity:0.65; }
.bar:nth-child(1){height:3px;animation-delay:0s}
.bar:nth-child(2){height:7px;animation-delay:0.15s}
.bar:nth-child(3){height:10px;animation-delay:0.3s}
.bar:nth-child(4){height:5px;animation-delay:0.1s}
@keyframes ba { from{transform:scaleY(0.2)} to{transform:scaleY(1)} }

/* Track volume (shown only when active) */
.track-vol { width:80%; opacity:0; transition:opacity 0.3s; margin-top:2px; }
.track.active .track-vol { opacity:1; }

.rain-badge { font-size:0.5rem; letter-spacing:0.4em; color:rgba(180,210,255,0.25); text-transform:uppercase; text-align:center; font-family:'Jost',sans-serif; margin-top:4px; }

/* Desktop: always show drawer content inline at bottom */
@media (min-width:601px) {
  .drawer-tab { display:none; }
  .drawer { max-height:none !important; padding:16px 20px 28px !important; border-radius:0; background:rgba(4,8,18,0.12); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); }
  .hero { padding-bottom:220px; }
}

/* Hint bar (desktop only) */
.hint { position:fixed; bottom:6px; right:16px; z-index:40; font-size:0.44rem; letter-spacing:0.28em; color:rgba(180,210,255,0.15); font-family:'Jost',sans-serif; pointer-events:none; }
@media (max-width:600px) { .hint { display:none; } }

.cursor { position:fixed; width:5px; height:5px; background:rgba(180,210,255,0.5); border-radius:50%; pointer-events:none; z-index:999; transform:translate(-50%,-50%); box-shadow:0 0 8px rgba(150,190,255,0.3); }
</style>
</head>
<body>

<!-- Backgrounds -->
<div class="bg active" id="bg0" style="background-image:url('bg1.jpg')"></div>
<div class="bg"        id="bg1" style="background-image:url('bg2.jpg')"></div>
<div class="bg"        id="bg2" style="background-image:url('bg3.jpg')"></div>
<div class="bg-overlay"></div>

<canvas id="rainCanvas"></canvas>
<canvas id="rippleCanvas"></canvas>
<div class="flash-overlay" id="lightning"></div>

<!-- Hero -->
<div class="hero">
  <div class="title">rainy hour</div>
  <div class="slogan">time slows down when it rains ☁️</div>
</div>

<!-- Top bar -->
<div class="topbar">
  <div class="scene-picker">
    <div class="thumb active" id="th0" style="background-image:url('bg1.jpg')" onclick="switchBg(0)"></div>
    <div class="thumb"        id="th1" style="background-image:url('bg2.jpg')" onclick="switchBg(1)"></div>
    <div class="thumb"        id="th2" style="background-image:url('bg3.jpg')" onclick="switchBg(2)"></div>
    <span class="scene-label">scene</span>
  </div>
  <div class="clock" id="clock"></div>
</div>

<!-- Quote (desktop) -->
<div class="quote" id="quote"></div>

<!-- Bottom drawer -->
<div class="drawer-wrap">
  <div class="drawer-tab" id="drawerTab" onclick="toggleDrawer()">
    <div class="tab-line"></div>
    <span class="tab-label">controls</span>
    <div class="tab-dot"></div>
    <div class="tab-line"></div>
  </div>

  <div class="drawer" id="drawer">

    <!-- Sliders -->
    <div class="d-section">
      <div class="sliders-row">
        <div class="sl-group">
          <div class="sl-label">Rain</div>
          <input type="range" id="sIntensity" min="50" max="800" value="300">
        </div>
        <div class="sl-group">
          <div class="sl-label">Wind</div>
          <input type="range" id="sWind" min="-3" max="3" value="0.5" step="0.1">
        </div>
        <div class="sl-group">
          <div class="sl-label">Volume</div>
          <input type="range" id="sVolume" min="0" max="1" value="0.6" step="0.01">
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="d-section">
      <div class="btns-row">
        <button class="btn" id="btnRain" onclick="toggleRain()">♩ rain</button>
        <button class="btn" id="btnThunder" onclick="toggleThunder()">⚡ thunder</button>
      </div>
    </div>

    <!-- Sound tracks -->
    <div class="d-section">
      <div class="d-label">soundscapes</div>
      <div class="tracks-row">
        <div class="track" id="tr-australia" onclick="toggleTrack('australia')">
          <div class="track-icon">🦅</div>
          <div class="wave"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
          <div class="track-name">Queensland<br>Dawn</div>
          <div class="track-sub">kookaburra</div>
          <input type="range" class="track-vol" id="vol-australia" min="0" max="1" value="0.7" step="0.01" onclick="e=>e.stopPropagation()">
        </div>
        <div class="track" id="tr-evening" onclick="toggleTrack('evening')">
          <div class="track-icon">🌿</div>
          <div class="wave"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
          <div class="track-name">Evening<br>Choir</div>
          <div class="track-sub">dusk birds</div>
          <input type="range" class="track-vol" id="vol-evening" min="0" max="1" value="0.65" step="0.01" onclick="e=>e.stopPropagation()">
        </div>
        <div class="track" id="tr-forest" onclick="toggleTrack('forest')">
          <div class="track-icon">🌲</div>
          <div class="wave"><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
          <div class="track-name">Forest<br>Nature</div>
          <div class="track-sub">deep ambience</div>
          <input type="range" class="track-vol" id="vol-forest" min="0" max="1" value="0.65" step="0.01" onclick="e=>e.stopPropagation()">
        </div>
      </div>
    </div>

    <div class="rain-badge" id="rainBadge">moderate rain</div>
  </div>
</div>

<div class="hint">space · rain &nbsp;|&nbsp; T · thunder &nbsp;|&nbsp; 1-3 · scene</div>
<div class="cursor" id="cursor"></div>

<script>
// ── Cursor ──────────────────────────────
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cursor.style.left=e.clientX+'px'; cursor.style.top=e.clientY+'px'; });

// ── Drawer ──────────────────────────────
let drawerOpen = false;
function toggleDrawer() {
  drawerOpen = !drawerOpen;
  document.getElementById('drawer').classList.toggle('open', drawerOpen);
}
// On mobile, open drawer on first tap anywhere on screen
let firstTap = true;
document.addEventListener('touchstart', () => {
  if(firstTap){ firstTap=false; setTimeout(()=>{ if(!drawerOpen) toggleDrawer(); }, 800); }
}, { once:true });

// ── Background ──────────────────────────
let currentBg = 0;
function switchBg(i) {
  document.getElementById('bg'+currentBg).classList.remove('active');
  document.getElementById('th'+currentBg).classList.remove('active');
  currentBg = i;
  document.getElementById('bg'+i).classList.add('active');
  document.getElementById('th'+i).classList.add('active');
}
let autoCycle = setInterval(() => switchBg((currentBg+1)%3), 90000);
document.querySelectorAll('.thumb').forEach(t => t.addEventListener('click', () => clearInterval(autoCycle)));

// ── Clock ────────────────────────────────
function updateClock() {
  const n=new Date(), h=String(n.getHours()).padStart(2,'0'), m=String(n.getMinutes()).padStart(2,'0'), s=String(n.getSeconds()).padStart(2,'0');
  const days=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  document.getElementById('clock').innerHTML=`${h} : ${m} : ${s}<br><span style="font-size:0.48rem;letter-spacing:0.45em;opacity:0.5">${days[n.getDay()]}</span>`;
}
updateClock(); setInterval(updateClock, 1000);

// ── Quotes ───────────────────────────────
const quotes=["let it rain\nlet it pour","the smell of\nearth after rain","grey skies\nwarm inside","every raindrop\ntells a story","stay a while\nand listen","soft rain\nsofter thoughts","birds sing\neven in rain"];
const quoteEl=document.getElementById('quote'); let qi=0;
function nextQuote(){ quoteEl.style.opacity=0; setTimeout(()=>{ quoteEl.textContent=quotes[qi++%quotes.length]; quoteEl.style.opacity=1; },2000); }
nextQuote(); setInterval(nextQuote, 18000);

// ── Rain Canvas ──────────────────────────
const rc=document.getElementById('rainCanvas'), ctx=rc.getContext('2d');
const rpc=document.getElementById('rippleCanvas'), rctx=rpc.getContext('2d');
let W,H;
function resize(){ W=rc.width=window.innerWidth; H=rc.height=window.innerHeight; rpc.width=window.innerWidth; rpc.height=120; }
window.addEventListener('resize',resize); resize();
let intensity=300, wind=0.5, drops=[], ripples=[];
class Drop{
  constructor(){ this.reset(true); }
  reset(i=false){ this.x=Math.random()*W; this.y=i?Math.random()*H:-20; this.len=Math.random()*18+8; this.speed=Math.random()*14+10; this.opacity=Math.random()*0.38+0.1; this.width=Math.random()*0.7+0.3; }
  update(){ this.x+=wind*(this.speed/18); this.y+=this.speed; if(this.y>H+20){if(Math.random()>0.85)ripples.push({x:this.x,y:108,rx:0,ry:0,life:1});this.reset();} }
  draw(){ ctx.beginPath(); ctx.moveTo(this.x,this.y); ctx.lineTo(this.x+wind*this.len/18,this.y+this.len); ctx.strokeStyle=`rgba(200,225,255,${this.opacity})`; ctx.lineWidth=this.width; ctx.stroke(); }
}
function drawRipples(){ rctx.clearRect(0,0,rpc.width,120); ripples=ripples.filter(r=>r.life>0); for(const r of ripples){r.rx+=1.1;r.ry+=0.28;r.life-=0.024; rctx.beginPath(); rctx.ellipse(r.x,r.y,r.rx,r.ry,0,0,Math.PI*2); rctx.strokeStyle=`rgba(180,215,255,${r.life*0.32})`; rctx.lineWidth=0.8; rctx.stroke();} }
function syncDrops(){ while(drops.length<intensity)drops.push(new Drop()); while(drops.length>intensity)drops.pop(); }
syncDrops();
function animate(){ ctx.clearRect(0,0,W,H); for(const d of drops){d.update();d.draw();} drawRipples(); requestAnimationFrame(animate); }
animate();

// ── Sliders ──────────────────────────────
const labelMap=v=>v<100?'drizzle':v<250?'light rain':v<450?'moderate rain':v<650?'heavy rain':'downpour';
document.getElementById('sIntensity').addEventListener('input',e=>{ intensity=parseInt(e.target.value); document.getElementById('rainBadge').textContent=labelMap(intensity); syncDrops(); if(rainGain)updateRainVol(); });
document.getElementById('sWind').addEventListener('input',e=>wind=parseFloat(e.target.value));
document.getElementById('sVolume').addEventListener('input',e=>{ masterVol=parseFloat(e.target.value); if(rainGain)updateRainVol(); for(const k in birdAudio){if(birdAudio[k])birdAudio[k].volume=masterVol*getVol(k);} });
function getVol(k){ const el=document.getElementById('vol-'+k); return el?parseFloat(el.value):0.7; }
['australia','evening','forest'].forEach(k=>{
  const el=document.getElementById('vol-'+k);
  el.addEventListener('input',e=>{ e.stopPropagation(); if(birdAudio[k])birdAudio[k].volume=masterVol*parseFloat(e.target.value); });
  el.addEventListener('click',e=>e.stopPropagation());
});

// ── Audio ────────────────────────────────
let audioCtx=null, masterVol=0.6;
function initAudio(){ if(audioCtx)return; audioCtx=new(window.AudioContext||window.webkitAudioContext)(); }
let rainNode=null, rainGain=null;
function createRainSound(){
  const sz=audioCtx.sampleRate*2, buf=audioCtx.createBuffer(1,sz,audioCtx.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<sz;i++) d[i]=(Math.random()*2-1);
  const src=audioCtx.createBufferSource(); src.buffer=buf; src.loop=true;
  const hp=audioCtx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=800;
  const bp=audioCtx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2000; bp.Q.value=0.5;
  rainGain=audioCtx.createGain(); updateRainVol();
  src.connect(hp); hp.connect(bp); bp.connect(rainGain); rainGain.connect(audioCtx.destination); src.start(); return src;
}
function updateRainVol(){ if(!rainGain)return; rainGain.gain.value=masterVol*(0.3+(intensity/800)*0.7)*0.8; }
function toggleRain(){
  initAudio();
  const btn=document.getElementById('btnRain');
  if(rainNode){rainNode.stop();rainNode=null;rainGain=null;btn.textContent='♩ rain';btn.classList.remove('active');}
  else{rainNode=createRainSound();btn.textContent='♩ rain ·';btn.classList.add('active');}
}

let thunderOn=false;
function playThunder(){
  if(!audioCtx||!thunderOn)return;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*3,audioCtx.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++){const e=Math.exp(-i/(audioCtx.sampleRate*0.8));d[i]=(Math.random()*2-1)*e*0.8;}
  const src=audioCtx.createBufferSource(); src.buffer=buf;
  const lp=audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=200;
  const g=audioCtx.createGain(); g.gain.value=masterVol*1.2;
  src.connect(lp); lp.connect(g); g.connect(audioCtx.destination); src.start();
  const fl=document.getElementById('lightning'); fl.classList.add('on'); setTimeout(()=>fl.classList.remove('on'),80);
  if(Math.random()>0.5) setTimeout(()=>{fl.classList.add('on');setTimeout(()=>fl.classList.remove('on'),60);},150);
}
function scheduleThunder(){ if(!thunderOn)return; setTimeout(()=>{if(thunderOn){playThunder();scheduleThunder();}},8000+Math.random()*20000); }
function toggleThunder(){
  initAudio(); thunderOn=!thunderOn;
  const btn=document.getElementById('btnThunder');
  btn.classList.toggle('active',thunderOn); btn.textContent=thunderOn?'⚡ thunder ·':'⚡ thunder';
  if(thunderOn){scheduleThunder();setTimeout(playThunder,1800);}
}

// ── Bird tracks ──────────────────────────
const BIRD_FILES={australia:'birds-australia.mp3',evening:'birds-evening.mp3',forest:'birds-forest.mp3'};
const birdAudio={}, trackOn={};
function toggleTrack(k){
  const el=document.getElementById('tr-'+k);
  if(trackOn[k]){
    trackOn[k]=false; el.classList.remove('active');
    if(birdAudio[k]) fadeAudio(birdAudio[k],birdAudio[k].volume,0,1500,()=>{birdAudio[k].pause();birdAudio[k].currentTime=0;});
  } else {
    trackOn[k]=true; el.classList.add('active');
    if(!birdAudio[k]){const a=new Audio(BIRD_FILES[k]);a.loop=true;a.volume=0;birdAudio[k]=a;}
    birdAudio[k].play().then(()=>fadeAudio(birdAudio[k],0,masterVol*getVol(k),2000)).catch(()=>{trackOn[k]=false;el.classList.remove('active');});
  }
}
function fadeAudio(audio,from,to,ms,done){
  const steps=40,interval=ms/steps,step=(to-from)/steps;let cur=from,n=0;
  audio.volume=Math.max(0,Math.min(1,from));
  const id=setInterval(()=>{cur+=step;n++;audio.volume=Math.max(0,Math.min(1,cur));if(n>=steps){clearInterval(id);audio.volume=Math.max(0,Math.min(1,to));if(done)done();}},interval);
}

// Bird dot floaters
setInterval(()=>{ if(Object.values(trackOn).some(Boolean)){spawnDot();if(Math.random()>0.5)setTimeout(spawnDot,350+Math.random()*500);} },4000+Math.random()*2000);
function spawnDot(){
  const el=document.createElement('div'); el.className='bird-dot';
  const sx=80+Math.random()*(window.innerWidth-160), sy=40+Math.random()*(window.innerHeight*0.4);
  el.style.cssText=`left:${sx}px;top:${sy}px;--dx:${(Math.random()>.5?1:-1)*(100+Math.random()*180)}px;--dy:${-(10+Math.random()*50)}px;animation-duration:${8+Math.random()*5}s`;
  document.body.appendChild(el); setTimeout(()=>el.remove(),14000);
}

// ── Keyboard ─────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key===' '){e.preventDefault();toggleRain();}
  if(e.key==='t'||e.key==='T') toggleThunder();
  if(e.key==='1') switchBg(0);
  if(e.key==='2') switchBg(1);
  if(e.key==='3') switchBg(2);
});
</script>
